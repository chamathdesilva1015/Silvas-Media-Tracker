name: Daily Discord Sync

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch: # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Discord Sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_MOVIE_COMPLETED: ${{ secrets.CHANNEL_MOVIE_COMPLETED }}
          CHANNEL_MOVIE_TOP: ${{ secrets.CHANNEL_MOVIE_TOP }}
          CHANNEL_ANIME_COMPLETED: ${{ secrets.CHANNEL_ANIME_COMPLETED }}
          CHANNEL_ANIME_TOP: ${{ secrets.CHANNEL_ANIME_TOP }}
          CHANNEL_MANGA_COMPLETED: ${{ secrets.CHANNEL_MANGA_COMPLETED }}
          CHANNEL_MANGA_TOP: ${{ secrets.CHANNEL_MANGA_TOP }}
          CHANNEL_TVSERIES_COMPLETED: ${{ secrets.CHANNEL_TVSERIES_COMPLETED }}
          CHANNEL_TVSERIES_TOP: ${{ secrets.CHANNEL_TVSERIES_TOP }}
        run: python discord_sync.py

      - name: Run Metadata Enrichment
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -c "import asyncio; from enrich_data import run_enrichment; asyncio.run(run_enrichment())"
